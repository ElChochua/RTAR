<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalAudioLink (RTABC)</title>
  <script type="module" src="/main.js" defer></script>
</head>

<body>
  <main class="container">
    <h1>LocalAudioLink</h1>

    <!-- Pantalla de Discovery -->
    <div id="discovery-status">
      <h2>Buscando Servidor...</h2>
      <p>Esperando paquete UDP en el puerto 5000...</p>
    </div>

    <!-- Panel de Servidor Encontrado -->
    <div id="server-panel" style="display: none; margin-top: 2rem;">
      <h2>¡Servidor Encontrado!</h2>
      <p id="server-ip-display" style="font-weight: bold; color: #00ff00;">IP: --</p>
      <button id="connect-btn" style="margin-top: 1rem;">Conectar y Escuchar Audio</button>
      <br>
      <button id="reconnect-btn" style="margin-top: 1rem; background-color: #ff4444; color: white;">Desconectar y Buscar
        Otro Servidor</button>
    </div>
  </main>
</body>

</html>
