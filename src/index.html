<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalAudioLink (RTABC)</title>
  <script type="module" src="/main.js" defer></script>
</head>

<body>
  <main class="container">
    <h1>LocalAudioLink</h1>

    <!-- Discovery Screen -->
    <div id="discovery-status">
      <h2>Searching for Server...</h2>
      <p>Waiting for UDP packet on port 5000...</p>
    </div>

    <div id="server-panel" style="display: none; margin-top: 2rem;">
      <h2>¡Servidor Encontrado!</h2>
      <p id="server-ip-display" style="font-weight: bold; color: #00ff00;">IP: --</p>
      <button id="connect-btn" style="margin-top: 1rem;">Connect and Listen to Audio</button>
      <br>
      <button id="reconnect-btn" style="margin-top: 1rem; background-color: #ff4444; color: white;">Disconnect and
        Search Another Server</button>

      <div id="media-controls" style="display: none; margin-top: 2rem; border-top: 1px solid #333; padding-top: 1rem;">
        <h3>Remote Controls</h3>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
          <button id="btn-prev">⏮ Previous</button>
          <button id="btn-playpause">⏯ Play/Pause</button>
          <button id="btn-next">⏭ Next</button>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
